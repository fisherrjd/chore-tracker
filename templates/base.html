<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Chore Tracker{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
  <header class="site-nav">
    <a class="brand" href="/">🧹 Chore Tracker</a>
    <nav>
      <a href="/" class="{{ 'active' if request.url.path == '/' }}">Schedule</a>
      <a href="/rooms" class="{{ 'active' if request.url.path.startswith('/rooms') }}">Rooms</a>
      <a href="/members" class="{{ 'active' if request.url.path.startswith('/members') }}">Members</a>
      <a href="/settings" class="{{ 'active' if request.url.path.startswith('/settings') }}">Settings</a>
    </nav>
  </header>

  <main class="page">
    {% if msg %}
    <div class="flash {{ kind }}">{{ msg }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script>
    // Preserve scroll position across POST→redirect form actions (adding or
    // removing a room/task/time) so the page doesn't jump back to the top.
    (function () {
      var KEY = "scroll:" + location.pathname;
      document.addEventListener("submit", function (e) {
        if (e.defaultPrevented) return;  // cancelled confirm() dialogs, etc.
        sessionStorage.setItem(KEY, String(window.scrollY));
      });
      window.addEventListener("DOMContentLoaded", function () {
        var y = sessionStorage.getItem(KEY);
        if (y !== null) {
          sessionStorage.removeItem(KEY);
          window.scrollTo(0, parseInt(y, 10));
        }
      });
    })();
  </script>
</body>
</html>
