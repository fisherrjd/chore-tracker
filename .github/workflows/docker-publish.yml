name: Build and publish image

on:
  push:
    branches: ["**"]   # main + every feature branch (temp builds)
    tags: ["v*"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main branch → rolling pointer + immutable per-commit
            type=raw,value=main-latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}}
            # feature branches → temp build, e.g. v0.2.0-b292c711
            type=sha,prefix={{branch}}-b,enable=${{ github.ref_type == 'branch' && github.ref_name != 'main' }}
            # version tags (vX.Y.Z) → 0.2.0 and the moving 0.2 pointer
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
